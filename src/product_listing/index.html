<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Product Listing</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/product-listing.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>
  <main>
    <section class="products">
      <h2></h2>
      <div class="products__controls">
        <label for="sort-products">Sort products</label>
        <select id="sort-products" name="sort-products">
          <option value="default">Default</option>
          <option value="price">Price: low to high</option>
          <option value="alpha">Alphabetical A-Z</option>
        </select>
      </div>
      <ul class="product-list">
        <!-- JavaScript will insert product cards here -->
      </ul>
    </section>
  </main>
  <footer id="main-footer"></footer>
</body>

</html>
