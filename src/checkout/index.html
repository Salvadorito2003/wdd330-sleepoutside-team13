<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header">
  </header>
  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>
    </section>
  </main>
  <form id="checkout-form">
    <!-- Personal Information -->
    <div class="row">
      <div class="form-group">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" required minlength="2" maxlength="50">
      </div>
      <div class="form-group">
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" required minlength="2" maxlength="50">
      </div>
    </div>

    <!-- Address Information -->
    <div class="form-group">
      <label for="street-address">Street Address</label>
      <input type="text" id="street-address" name="streetAddress" required maxlength="100">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" required maxlength="50">
      </div>
      <div class="form-group">
        <label for="state">State</label>
        <input type="text" id="state" name="state" required maxlength="50">
      </div>
      <div class="form-group">
        <label for="zip-code">Zip Code</label>
        <!-- Al menos 5 dígitos numéricos -->
        <input type="text" id="zip-code" name="zipCode" required pattern="\d{5}(-\d{4})?"
          title="5 digits (e.g., 90210)">
      </div>
    </div>

    <!-- Payment Information -->
    <div class="form-group">
      <label for="card-number">Credit Card Number</label>
      <!-- Entre 13 y 19 dígitos (estándar de tarjetas) -->
      <input type="text" id="card-number" name="cardNumber" required pattern="\d{13,19}" inputmode="numeric"
        title="13 to 19 digits" placeholder="1234567890123456">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="exp-date">Expiration Date</label>
        <!-- Formato MM/YY -->
        <input type="text" id="exp-date" name="expDate" required pattern="(0[1-12]|1[0-2])\/?([0-9]{2})"
          placeholder="MM/YY" title="Format: MM/YY (e.g., 12/28)">
      </div>
      <div class="form-group">
        <label for="cvv">Security Code (CVV)</label>
        <!-- 3 o 4 dígitos numéricos -->
        <input type="text" id="cvv" name="cvv" required pattern="\d{3,4}" inputmode="numeric" title="3 or 4 digits"
          placeholder="123">
      </div>
    </div>

    <!-- Submit Button -->
    <button type="submit">Checkout</button>
  </form>
  <div id="success-message" class="success-box" hidden>
    <p id="tax-text"></p>
    <p id="shipping-estimate-text"></p>
    <p id="order-total-text"></p>
  </div>
  <footer id="main-footer">
  </footer>
</body>

</html>
