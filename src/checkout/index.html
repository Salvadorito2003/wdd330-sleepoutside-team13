<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>


    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
      <section class="form-and-summary">
        <div class="form">
          <form name="checkout" action="/submit" method="post">
            
            <fieldset>
              <legend>Personal Information</legend>
              <label for="fname">Name:</label>
              <input type="text" id="fname" name="fname" required/>

              <label for="lname">Last Name:</label>
              <input type="text" id="lname" name="lname" required/>
            </fieldset>

            <fieldset>
              <legend>Shipping Information</legend>
              <label for="street">Street Address:</label>
              <input type="text" id="street" name="street" required/>

              <label for="city">City:</label>
              <input type="text" id="city" name="city" required/>

              <label for="state">State:</label>
              <input type="text" id="state" name="state" required/>

              <label for="zip">Zip Code:</label>
              <input type="text" id="zip" name="zip" required/>
            </fieldset>

            <fieldset>
              <legend>Payment Information</legend>
              <label for ="cardNumber">Credit Card Number</label>
              <input type ="text" id="cardNumber" name="cardNumber" required/>

              <label for ="expiration">Expiration Date:</label>
              <input type ="text" id="expiration" name="expiration" required/>

              <label for ="code">Security Code:</label>
              <input type ="text" id="code" name="code" required/>
            </fieldset>
            <fieldset class="checkout-summary">
              <legend>Order Summary</legend>

              <div class="order__summary">
                <div>Items</div>
                <div id="num-items"></div>
                <div>Subtotal</div>
                <div id="cartTotal"></div>
                <div>Tax</div>
                <div id="tax"></div>
                <div>Shipping</div>
                <div id="shipping"></div>
                <div>Total</div>
                <div id="orderTotal"></div>
              </div>
            </fieldset>
            <button type="submit" id="submit">Buy my Items</button>
          </form>
        </div>
      </section>
      
    </main>

    <footer id="main-footer">
    </footer>
  </body>
</html>
