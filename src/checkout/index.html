<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header">
  </header>
  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>
    </section>
  </main>
  <form id="checkoutForm" name="checkoutForm" class="divider">
    <!-- Personal Information -->
    <div class="row">
      <div class="form-group">
        <label for="fname">First Name</label>
        <input type="text" id="first-name" name="fname" required minlength="2" maxlength="50" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+">
      </div>
      <div class="form-group">
        <label for="lname">Last Name</label>
        <input type="text" id="last-name" name="lname" required minlength="2" maxlength="50" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+">
      </div>
    </div>

    <!-- Address Information -->
    <div class="form-group">
      <label for="street">Street Address</label>
      <input type="text" id="street-address" name="street" required maxlength="100">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" required maxlength="50" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+">
      </div>
      <div class="form-group">
        <label for="state">State</label>
        <input type="text" id="state" name="state" required maxlength="50" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+">
      </div>
      <div class="form-group">
        <label for="zip">Zip Code</label>
        <input type="text" id="zip" name="zip" required pattern="\d{5}(-\d{4})?"
          title="5 digits (e.g., 90210)">
      </div>
    </div>

    <!-- Payment Information -->
    <div class="form-group">
      <label for="card-number">Credit Card Number</label>
      <input type="text" id="card-number" name="cardNumber" required pattern="\d{13,19}" inputmode="numeric"
        title="13 to 19 digits" placeholder="1234567890123456">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="expiration">Expiration Date</label>
        <input type="text" id="exp-date" name="expiration" required pattern="(0[1-12]|1[0-2])\/?([0-9]{2})"
          placeholder="MM/YY" title="Format: MM/YY (e.g., 12/28)">
      </div>
      <div class="form-group">
        <label for="code">Security Code (CVV)</label>
        <input type="text" id="cvv" name="code" required pattern="\d{3}" inputmode="numeric" title="3 or 4 digits"
          placeholder="123">
      </div>
    </div>
    <div class="order-summary">
      <div>Items</div>
      <div id="num-items"></div>
      <div>Subtotal</div>
      <div id="cartTotal"></div>
      <div>Tax</div>
      <div id="tax"></div>
      <div>Shipping</div>
      <div id="shipping"></div>
      <div>Total</div>
      <div id="orderTotal"></div>
    </div>
    <button type="submit" id="checkoutSubmit">Checkout</button>
  </form>

  <footer id="main-footer">
  </footer>
</body>

</html>
