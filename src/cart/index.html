<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Cart</title>

    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/cart.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>

    <main class="divider">
      <section class="products">
        <h2>My Cart</h2>

        <ul class="product-list">
          <!-- JavaScript inserts products here -->
        </ul>
      </section>
      <div class="cart-footer">
        <p class="cart-total">Total: </p>
      </div>
      <div class="cart-actions">
        <h3 class="cart-empty-message">Your cart is empty</h3>
        <a href="/checkout/index.html" class="button" id="checkoutSubmit" hidden>Proceed to Checkout</a>
      </div>
    </main>

    <footer id="main-footer">
    </footer>
  </body>
</html>
