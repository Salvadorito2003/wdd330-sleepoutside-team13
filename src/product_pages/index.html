<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Details</title>
    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/product.js" type="module"></script>
    <script src="../js/main.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>

    <main class="divider">
      <section class="product-detail">
        <h3 id="p-brand"></h3>

        <h3 class="divider">product</h3>

        <img>
          class="divider"
          src="" 
          alt="" 
          id="p-image" 
          width="300"
        </img>

        <p class="product-card__price"></p>

        <p class="product__color">Color</p>

        <p id="product-description"></p>

        <div class="product-detail__add">
          <button id="addToCart" data-id="">Add to Cart</button>
        </div>
        <!-- JavaScript inserts product here -->
      </section>
    </main>
    <footer id="main-footer">
    </footer>
  </body>
</html>
