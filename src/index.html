<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="js/main.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="categories">
        <h2>Categories</h2>
        <div class="category-grid">
          <a id="tents" href="product_listing/index.html?category=tents">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-tents.svg" alt="tents">
            <h3>Tents</h3>
          </a>
          <a id="backpacks" href="product_listing/index.html?category=backpacks">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-backpacks.svg" alt="backpacks">
            <h3>Backpacks</h3>
          </a>
          <a id="sleepingbags" href="product_listing/index.html?category=sleeping-bags">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-sleepingbags.svg" alt="sleepingbags">
            <h3>Sleepingbags</h3>
          </a>
          <a id="hammocks" href="product_listing/index.html?category=hammocks">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-hammocks.svg" alt="hammocks">
            <h3>Hammocks</h3>
          </a>
        </div>
      </section>

    </main>
    <footer id="main-footer">
    </footer>
  </body>
</html>
